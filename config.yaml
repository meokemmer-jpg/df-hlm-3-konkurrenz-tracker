# DF-HLM-3 Konkurrenz-Tracker Configuration [CRUX-MK]

df_id: DF-HLM-3
df_name: konkurrenz-tracker
version: 0.1.0-WAVE-2
status: ACTIVE
crux-mk: true

description: |
  Konkurrenz-Tracker fuer HeyLou-Marketing-Wave-2.
  Aggregiert Trustpilot-Ratings, Booking.com-Partnerdaten und Web-Scraping-Fallback
  fuer 7 HeyLou-Hotels plus 12 relevante Konkurrenz-Standorte.
  Output: taegliches CSV, Heatmap-Image und Slack-Alert-JSON.

k11_cascade_containment:
  cascade_isolation: hard
  failure_blast_radius: 1
  dependency_dlq_separate: true
  dependency_dlq_strategy: "eigene DLQ pro Hotel; Trustpilot/Booking-Failures bleiben auf Hotel-Ebene isoliert"

k12_distillation_resistenz:
  provenance_required_in_output: true
  non_llm_validation_layer: "deterministischer rating_diff_check + market_position_diff"

k13_independent_ground_truth:
  external_anchor_type: external_api_source
  pre_action_domain_check: true
  external_anchor_sources:
    - trustpilot_api
    - booking_partner_api

k14_human_override_decay:
  override_complexity: single_command
  martin_review_cadence: monthly

k15_entropy_budget:
  entropy_added_loc_estimate: 400
  entropy_justified_by_rho: "EUR 40-55k/Jahr Konkurrenz-Reaction-Velocity"

k16_concurrent_spawn_mutex:
  lock_dir: /tmp/df-hlm-3.lock
  engine_pgrep_check: true
  lock_stale_age_h: 6

lose_coupling:
  LC1_graceful_degradation:
    modes:
      - full
      - degraded_trustpilot_api
      - degraded_booking_api
      - web_scraping_fallback
      - standalone_cache_only
  LC2_direct_mode_fallback:
    capability: 0.80
    trigger: ">=1 API unreachable >30s"
  LC3_circuit_breaker:
    timeout_s: 30
    open_threshold: 3
    rate_limit_backoff_s: 60
  LC4_failure_isolation:
    state_externalization: true
    idempotent: true
  LC5_health_check_independence:
    health_check_dependencies: []

env_var_gating:
  default_mode: mock
  required_for_real_mode:
    DF_HLM_3_REAL_TRUSTPILOT_ENABLED: true
    DF_HLM_3_REAL_BOOKING_PARTNER_ENABLED: true
    PHRONESIS_TICKET: PT-2026-XX-XXX

operations:
  output_path: ~/Projects/dark-factories/df-hlm-3-konkurrenz-tracker/
  accessible_mirror_path: ~/Library/CloudStorage/GoogleDrive-m.e.o.kemmer@gmail.com/Meine Ablage/Claude-Knowledge-System/dark-factories/df-hlm-3-konkurrenz-tracker/
  daily_output_dir: outputs/daily
  heatmap_dir: outputs/heatmaps
  slack_alert_dir: outputs/slack
  audit_log_path: audit/df-hlm-3-audit.jsonl
  dlq_dir: runs/dlq
  health_file_path: /tmp/df-hlm-3-health.json
  allowed_domains:
    - api.trustpilot.com
    - distribution-xml.booking.com
    - booking.com
    - www.booking.com
    - trustpilot.com

